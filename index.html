<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海市襄阳南路第一幼儿园</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23FFB347'/><circle cx='38' cy='42' r='4' fill='%23333'/><circle cx='62' cy='42' r='4' fill='%23333'/><path d='M 35 55 Q 50 68 65 55' stroke='%23333' stroke-width='3' fill='none' stroke-linecap='round'/></svg>">
</head>
<body>
    <div class="container">
        <!-- 学校LOGO区域 -->
        <div class="logo-section">
            <div class="logo-wrapper">
                <svg class="school-logo" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
                    <!-- 背景装饰圆 -->
                    <circle cx="100" cy="90" r="75" fill="#FFF8E7" opacity="0.6"/>
                    
                    <!-- 太阳 -->
                    <g class="sun">
                        <circle cx="100" cy="85" r="35" fill="#FFB347" stroke="#FF8C42" stroke-width="2"/>
                        <circle cx="100" cy="85" r="30" fill="#FFD93D" opacity="0.8"/>
                        <!-- 太阳光芒 -->
                        <line x1="100" y1="35" x2="100" y2="45" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="100" y1="125" x2="100" y2="135" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="50" y1="85" x2="60" y2="85" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="140" y1="85" x2="150" y2="85" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="65" y1="50" x2="72" y2="57" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="128" y1="113" x2="135" y2="120" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="135" y1="50" x2="128" y2="57" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <line x1="72" y1="113" x2="65" y2="120" stroke="#FFB347" stroke-width="3" stroke-linecap="round"/>
                        <!-- 太阳眼睛 -->
                        <circle cx="88" cy="78" r="4" fill="#333"/>
                        <circle cx="112" cy="78" r="4" fill="#333"/>
                        <!-- 太阳腮红 -->
                        <circle cx="80" cy="88" r="5" fill="#FF9999" opacity="0.6"/>
                        <circle cx="120" cy="88" r="5" fill="#FF9999" opacity="0.6"/>
                        <!-- 太阳嘴巴 -->
                        <path d="M 90 92 Q 100 100 110 92" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </g>
                    
                    <!-- 星星装饰 -->
                    <g class="stars">
                        <polygon points="50,25 52,31 58,31 53,35 55,41 50,37 45,41 47,35 42,31 48,31" fill="#87CEEB" opacity="0.9"/>
                        <polygon points="150,30 152,36 158,36 153,40 155,46 150,42 145,46 147,40 142,36 148,36" fill="#FFB6C1" opacity="0.9"/>
                        <polygon points="35,55 36.5,59 40.5,59 37.5,62 38.5,66 35,63 31.5,66 32.5,62 29.5,59 33.5,59" fill="#FFD700" opacity="0.8"/>
                        <polygon points="165,60 166.5,64 170.5,64 167.5,67 168.5,71 165,68 161.5,71 162.5,67 159.5,64 163.5,64" fill="#98D8C8" opacity="0.8"/>
                    </g>
                    
                    <!-- 书本 -->
                    <g class="book-left">
                        <rect x="25" y="110" width="22" height="28" rx="2" fill="#87CEEB" stroke="#5DADE2" stroke-width="1.5"/>
                        <rect x="27" y="112" width="18" height="24" rx="1" fill="#B8E6F0"/>
                        <line x1="30" y1="118" x2="42" y2="118" stroke="#5DADE2" stroke-width="1" opacity="0.5"/>
                        <line x1="30" y1="123" x2="40" y2="123" stroke="#5DADE2" stroke-width="1" opacity="0.5"/>
                        <line x1="30" y1="128" x2="41" y2="128" stroke="#5DADE2" stroke-width="1" opacity="0.5"/>
                    </g>
                    
                    <g class="book-right">
                        <rect x="153" y="105" width="22" height="28" rx="2" fill="#FFB6C1" stroke="#F48FB1" stroke-width="1.5"/>
                        <rect x="155" y="107" width="18" height="24" rx="1" fill="#FCE4EC"/>
                        <line x1="158" y1="113" x2="170" y2="113" stroke="#F48FB1" stroke-width="1" opacity="0.5"/>
                        <line x1="158" y1="118" x2="168" y2="118" stroke="#F48FB1" stroke-width="1" opacity="0.5"/>
                        <line x1="158" y1="123" x2="169" y2="123" stroke="#F48FB1" stroke-width="1" opacity="0.5"/>
                    </g>
                    
                    <!-- 铅笔 -->
                    <g class="pencil" transform="rotate(-30, 165, 145)">
                        <rect x="160" y="130" width="8" height="30" fill="#FFD93D" stroke="#F4D03F" stroke-width="1"/>
                        <polygon points="160,130 164,122 168,130" fill="#F5DEB3" stroke="#DEB887" stroke-width="1"/>
                        <polygon points="162,122 164,118 166,122" fill="#333"/>
                        <rect x="160" y="158" width="8" height="6" rx="1" fill="#FF6B6B"/>
                    </g>
                    
                    <!-- 绿色草地 -->
                    <g class="grass">
                        <ellipse cx="55" cy="155" rx="40" ry="18" fill="#90EE90"/>
                        <ellipse cx="100" cy="160" rx="45" ry="20" fill="#7FDD7F"/>
                        <ellipse cx="145" cy="155" rx="38" ry="16" fill="#98FB98"/>
                        <path d="M 35 145 Q 40 135 45 145" stroke="#228B22" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
                        <path d="M 150 148 Q 155 138 160 148" stroke="#228B22" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
                        <path d="M 70 150 Q 75 140 80 150" stroke="#228B22" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
                    </g>
                </svg>
            </div>
            <h1 class="school-name">上海市襄阳南路第一幼儿园</h1>
            <p class="school-subtitle">Shanghai Xiangyang South Road No.1 Kindergarten</p>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="请输入搜索内容..." 
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn" type="button">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <span>搜索</span>
                </button>
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="footer">
            <p> 上海市襄阳南路第一幼儿园 版权所有</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
